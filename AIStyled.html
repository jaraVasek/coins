<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toggle Coin Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #2d3748;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .subtitle {
            color: #718096;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .coin-display {
            background: #f7fafc;
            border-radius: 16px;
            padding: 30px;
            margin: 30px 0;
            perspective: 1000px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #coinImgID {
            max-width: 200px;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 30px rgba(102, 126, 234, 0.3));
            transition: filter 0.3s ease;
        }

        .flip {
            animation: flip 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes flip {
            0% {
                transform: rotateY(0deg) rotateZ(0deg) translateY(0px) scale(1);
                opacity: 1;
            }
            15% {
                transform: rotateY(180deg) rotateZ(8deg) translateY(-15px) scale(1.05);
            }
            35% {
                transform: rotateY(540deg) rotateZ(-8deg) translateY(10px) scale(0.98);
            }
            55% {
                transform: rotateY(900deg) rotateZ(6deg) translateY(-8px) scale(1.02);
            }
            75% {
                transform: rotateY(1260deg) rotateZ(-3deg) translateY(3px) scale(1.01);
            }
            100% {
                transform: rotateY(1440deg) rotateZ(0deg) translateY(0px) scale(1);
                opacity: 1;
            }
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #startStopBtnID {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        #startStopBtnID:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        #startStopBtnID:active {
            transform: translateY(0);
        }

        .stats-container {
            background: #f7fafc;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #718096;
            font-size: 14px;
            font-weight: 500;
        }

        .stat-value {
            color: #2d3748;
            font-size: 20px;
            font-weight: 700;
            min-width: 60px;
            text-align: right;
        }

        .stat-item.total .stat-label {
            color: #667eea;
            font-weight: 600;
        }

        .stat-item.total .stat-value {
            color: #667eea;
        }

        .stat-item.heads .stat-value {
            color: #48bb78;
        }

        .stat-item.tails .stat-value {
            color: #ed8936;
        }

        .reset-btn {
            width: 100%;
            padding: 12px;
            background: #edf2f7;
            color: #4a5568;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            background: #e2e8f0;
            border-color: #a0aec0;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #cbd5e0;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        .status-indicator.active {
            background: #48bb78;
            animation: pulse-active 1s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }

        @keyframes pulse-active {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(72, 187, 120, 0.7);
            }
            70% {
                box-shadow: 0 0 0 8px rgba(72, 187, 120, 0);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px;
            }

            h1 {
                font-size: 24px;
            }

            button {
                padding: 12px 16px;
                font-size: 14px;
            }

            .stat-value {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Coin Flip Timer</h1>
        <p class="subtitle">Press start to begin flipping</p>

        <div class="coin-display">
            <img id="coinImgID" src="images/tails.png" alt="Coin Tails">
        </div>

        <div class="button-group">
            <button id="startStopBtnID">Start</button>
        </div>

        <div class="stats-container">
            <div class="stat-item total">
                <span class="stat-label">
                    <span class="status-indicator"></span>
                    Total flips
                </span>
                <span class="stat-value" id="totalPgID">0</span>
            </div>
            <div class="stat-item heads">
                <span class="stat-label">Heads</span>
                <span class="stat-value" id="headsPgID">0</span>
            </div>
            <div class="stat-item tails">
                <span class="stat-label">Tails</span>
                <span class="stat-value" id="tailsPgID">0</span>
            </div>
        </div>

        <button class="reset-btn" id="resetBtnID">Reset stats</button>
    </div>

    <script>
        const startStopBtn = document.getElementById("startStopBtnID");
        const resetBtn = document.getElementById("resetBtnID");
        const coinImage = document.getElementById("coinImgID");
        const totalPg = document.getElementById("totalPgID");
        const headsPg = document.getElementById("headsPgID");
        const tailsPg = document.getElementById("tailsPgID");
        const statusIndicator = document.querySelector(".status-indicator");

        let total = 0;
        let heads = 0;
        let tails = 0;
        let timerID = null;
        let isRunning = false;

        startStopBtn.addEventListener("click", startStopTimer);
        resetBtn.addEventListener("click", resetStats);

        function startStopTimer() {
            if (timerID == null) {
                timerID = setInterval(tossCoin, 1500);
                startStopBtn.textContent = "Stop";
                isRunning = true;
                statusIndicator.classList.add("active");
            } else {
                clearInterval(timerID);
                timerID = null;
                startStopBtn.textContent = "Start";
                isRunning = false;
                statusIndicator.classList.remove("active");
            }
        }

        function tossCoin() {
            let coinValue = Math.floor(Math.random() * 2) + 1;
            total++;

            if (coinValue == 1) {
                heads++;
                coinImage.src = "images/heads.png";
                coinImage.alt = "Coin Heads";
            } else {
                tails++;
                coinImage.src = "images/tails.png";
                coinImage.alt = "Coin Tails";
            }

            displayCoinImage();
            displayTotals();
        }

        function displayCoinImage() {
            coinImage.classList.remove("flip");
            void coinImage.offsetWidth;
            coinImage.classList.add("flip");
        }

        function displayTotals() {
            totalPg.textContent = total;
            headsPg.textContent = heads;
            tailsPg.textContent = tails;
        }

        function resetStats() {
            if (isRunning) {
                startStopTimer();
            }
            total = 0;
            heads = 0;
            tails = 0;
            displayTotals();
            coinImage.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Ccircle cx='100' cy='100' r='95' fill='%23fbbf24' stroke='%23d97706' stroke-width='3'/%3E%3Ctext x='100' y='110' font-size='48' font-weight='bold' text-anchor='middle' fill='%23782e1f'%3ET%3C/text%3E%3C/svg%3E";
        }
    </script>
</body>
</html>
