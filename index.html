<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Actions</title>

</head>

<body>
    <h1>Coin Actions</h1>
    <!-- <button id="btnHeadsID" onclick="displayHeads()">Display Heads</button>
    <button id="btnTailsID" onclick="displayTails()">Display Tails</button> -->
    <button id="btnHeadsID">Display Heads</button>
    <button id="btnTailsID">Display Tails</button>
    <a href="tossCoin.html">go to toss</a>

    <br> <br>

    <img id="coinImageID" src="images/tails.png" alt="Coin" height="120px" width="120px">

    <script>
        const coinHead = document.getElementById("btnHeadsID");
        const coinTail = document.getElementById("btnTailsID");
        const coinImage = document.getElementById("coinImageID");

        coinHead.addEventListener("click", showCoinHead);
        coinTail.addEventListener("click", showTailHead);

        function showCoinHead() {
            coinImage.src = "images/heads.png";
            coinImage.alt = "Coin Head";
        }

        function showTailHead() {
            coinImage.src = "images/tails.png";
            coinImage.alt = "Coin Tails";

        }
    </script>

</body>

</html>
