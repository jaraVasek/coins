<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Toss</title>

    <style>
        body {
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background: #333;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #555;
        }

        @keyframes buttonPop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Toss Button Glow Animation */
        #tossCoinBtnID.animate {
            animation: buttonPop 0.3s ease, buttonGlow 0.6s ease;
        }

        @keyframes buttonPop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes buttonGlow {
            0% {
                box-shadow: 0 0 0px #ffcc00;
            }

            50% {
                box-shadow: 0 0 15px #ffcc00;
            }

            100% {
                box-shadow: 0 0 0px #ffcc00;
            }
        }

        /* Coin styles */
        #coinImageID {
            display: block;
            margin: 20px auto;
            border: 3px solid red;
            border-radius: 50%;
            transform-style: preserve-3d;
            backface-visibility: hidden;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
            transition: box-shadow 0.3s ease;
        }

        .flip {
            animation: flip 0.8s ease-in;
        }

        @keyframes flip {
            0% {
                transform: rotateX(0deg);
            }

            100% {
                transform: rotateX(720deg);
            }
        }

        /* card */
        .card {
            width: 260px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card h2 {
            margin-top: 0;
        }

        .card p {
            font-size: 18px;
            margin: 8px 0;
        }

        /* Animated number change */
        .statNumber {
            display: inline-block;
            transition: all 0.4s ease;
            font-weight: bold;
            color: #333;
        }

        .statNumber.animate {
            transform: scale(1.5);
            color: #ff4500;
        }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ffcc00;
            top: -10px;
            z-index: 9999;
            opacity: 0.9;
            animation: fall 2s linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <h1>Coin Toss</h1>

    <button id="tossCoinBtnID">Toss Coin</button>
    <br>
    <!-- <button id="flipBtnID">Flip Coin</button> -->

    <img id="coinImageID" src="images/tails.png" alt="Coin" height="120" width="120">

    <div class="card">
        <h2>Coin Toss Stats</h2>

        <p>Tosses: <span id="tossCount" class="statNumber">0</span></p>
        <p>Heads: <span id="headsCount" class="statNumber">0</span></p>
        <p>Tails: <span id="tailsCount" class="statNumber">0</span></p>
    </div>

    <script>

        timerID = setInterval(tossCoin, 3000);




        // getting elements from html
        let tossCoinBtn = document.getElementById("tossCoinBtnID");
        let coinImage = document.getElementById("coinImageID");
        let flipBtn = document.getElementById("flipBtnID");

        let tossCount = document.getElementById("tossCount");
        let headsCount = document.getElementById("headsCount");
        let tailsCount = document.getElementById("tailsCount");

        // button ref
        tossCoinBtn.addEventListener("click", tossCoin);
        // flipBtn.addEventListener("click", flipCoinImg);

        // keeping count
        let numberOfTosses = 0;
        let heads = 0;
        let tails = 0;

        // animating 
        function animateNumber(element) {
            element.classList.add("animate");
            setTimeout(function () {
                element.classList.remove("animate");
            }, 400);
        }

        function flipCoinImg(coinImageFile) {
            coinImage.classList.remove("flip");
            coinImage.offsetWidth;
            coinImage.classList.add("flip");
            coinImage.src = coinImageFile;
            // Shadow effect
            coinImage.style.boxShadow = "0 15px 25px rgba(0,0,0,0.5)";
            setTimeout(function () { coinImage.style.boxShadow = "0 8px 15px rgba(0,0,0,0.3)"; }, 400);
        }
        // Animate the Toss Coin button
        function animateCoinBtn() {
            tossCoinBtn.classList.remove("animate");
            tossCoinBtn.offsetWidth; // force reflow
            tossCoinBtn.classList.add("animate");
        }
        // Animate the Toss Coin button
        function animateCoinBtn() {
            tossCoinBtn.classList.remove("animate");
            tossCoinBtn.offsetWidth; // force reflow
            tossCoinBtn.classList.add("animate");
        }
        // Random pastel background pulse
        function pulseBackground() {
            var r = Math.floor(Math.random() * 155 + 100);
            var g = Math.floor(Math.random() * 155 + 100);
            var b = Math.floor(Math.random() * 155 + 100);
            document.body.style.background = "rgb(" + r + "," + g + "," + b + ")";
        }
        // Confetti animation
        function createConfetti() {
            for (var i = 0; i < 50; i++) {
                var conf = document.createElement("div");
                conf.className = "confetti";
                conf.style.left = Math.random() * window.innerWidth + "px";
                conf.style.background = "hsl(" + Math.random() * 360 + ",100%,50%)";
                conf.style.width = Math.random() * 8 + 4 + "px";
                conf.style.height = conf.style.width;
                document.body.appendChild(conf);
                (function (c) {
                    setTimeout(function () { c.remove(); }, 2000);
                })(conf);
            }
        }
        function tossCoin() {

            animateCoinBtn();
            pulseBackground();
            animateCoinBtn();

            numberOfTosses++;

            let coinValue = Math.floor(Math.random() * 2) + 1;

            let coinImageFile;

            if (coinValue == 1) {
                coinImageFile = "images/heads.png";
                coinImage.alt = "Coin Head";
                heads++;
                createConfetti()
            }
            else {
                coinImageFile = "images/tails.png";
                coinImage.alt = "Coin Tails";
                tails++;
            }

            flipCoinImg(coinImageFile);
            display();

            // if (numberOfTosses == 5) {
            //     tossCoinBtn.disabled = true;
            // }
        }
        function display() {
            // Update numbers
            tossCount.textContent = numberOfTosses;
            headsCount.textContent = heads;
            tailsCount.textContent = tails;

            // Animate numbers
            animateNumber(tossCount);
            animateNumber(headsCount);
            animateNumber(tailsCount);

        }
    </script>

</body>

</html>
